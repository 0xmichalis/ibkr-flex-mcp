name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Pinned tool versions. Each is cached by version as a standalone binary, so
  # bumping a version here is the only thing that triggers a reinstall.
  CARGO_SORT_VERSION: "2.0.1"
  CARGO_AUDIT_VERSION: "0.22.0"
  CARGO_DENY_VERSION: "0.19.8"

jobs:
  fmt:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup component add rustfmt
        rustup show

    - name: Cache cargo-sort binary
      id: cache-cargo-sort
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/cargo-sort
        key: cargo-sort-bin-${{ env.CARGO_SORT_VERSION }}

    - name: Add cargo-sort to PATH
      run: echo "${{ runner.tool_cache }}/cargo-sort/bin" >> "$GITHUB_PATH"

    - name: Install cargo-sort
      if: steps.cache-cargo-sort.outputs.cache-hit != 'true'
      run: cargo install --root "${{ runner.tool_cache }}/cargo-sort" --version ${{ env.CARGO_SORT_VERSION }} --locked cargo-sort

    - name: Check Format
      run: cargo fmt --all -- --check

    - name: Check cargo sort
      run: cargo sort --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup component add clippy
        rustup show

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup show

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

    - name: Cargo check
      run: cargo check --workspace --all-targets --all-features

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup show

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

    - name: Run tests
      run: cargo test --workspace --all-features

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup show

    - name: Cache cargo-audit binary
      id: cache-cargo-audit
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/cargo-audit
        key: cargo-audit-bin-${{ env.CARGO_AUDIT_VERSION }}

    - name: Add cargo-audit to PATH
      run: echo "${{ runner.tool_cache }}/cargo-audit/bin" >> "$GITHUB_PATH"

    - name: Install cargo-audit
      if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
      run: cargo install --root "${{ runner.tool_cache }}/cargo-audit" --version ${{ env.CARGO_AUDIT_VERSION }} --locked cargo-audit

    - name: Run cargo audit
      run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup show

    - name: Cache cargo registry and git
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo-deny binary
      id: cache-cargo-deny
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/cargo-deny
        key: cargo-deny-bin-${{ env.CARGO_DENY_VERSION }}

    - name: Add cargo-deny to PATH
      run: echo "${{ runner.tool_cache }}/cargo-deny/bin" >> "$GITHUB_PATH"

    - name: Install cargo-deny
      if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
      run: cargo install --root "${{ runner.tool_cache }}/cargo-deny" --version ${{ env.CARGO_DENY_VERSION }} --locked cargo-deny

    - name: Run cargo deny
      run: cargo deny check bans licenses sources
