name: Release

# Publish a GitHub Release with prebuilt, fully-static (musl) Linux binaries when a
# version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# musl binaries are statically linked (no libc dependency), so they run on any
# x86_64 Linux regardless of the host's glibc version.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # required to create the release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          # aarch64-unknown-linux-musl can be added here later (cross handles it).

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup show

    # `cross` builds the musl target inside a container with the full toolchain
    # (C compiler + cmake) that aws-lc-rs / reqwest's TLS stack needs.
    - name: Install cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Build static binary
      run: cross build --release --locked --target ${{ matrix.target }}

    - name: Package
      run: |
        version="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
        staging="ibkr-flex-mcp-${version}-${{ matrix.target }}"
        mkdir -p "$staging"
        cp "target/${{ matrix.target }}/release/ibkr-flex-mcp" "$staging/"
        cp README.md LICENSE "$staging/"
        tar czf "${staging}.tar.gz" "$staging"
        sha256sum "${staging}.tar.gz" > "${staging}.tar.gz.sha256"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.target }}
        path: |
          ibkr-flex-mcp-*.tar.gz
          ibkr-flex-mcp-*.tar.gz.sha256
        if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        draft: false
        generate_release_notes: true
        files: |
          artifacts/ibkr-flex-mcp-*.tar.gz
          artifacts/ibkr-flex-mcp-*.tar.gz.sha256
