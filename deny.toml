# cargo-deny configuration.
#
# Advisories are owned by the `cargo audit` CI job, so they are not checked here.
# cargo-deny covers what audit cannot: license policy, banned/duplicate crates,
# and allowed sources.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.8
private = { ignore = true }

[bans]
# Transitive crates appear at multiple versions; flag, don't fail.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
